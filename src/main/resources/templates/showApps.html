<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title='Applications')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar(active='apps')}"></nav>

<main class="container py-4" style="max-width: 860px;">
    <div class="page-header">
        <div>
            <h1>Applications</h1>
            <div class="text-muted-sm" th:unless="${#lists.isEmpty(applications)}"
                 th:text="${#lists.size(applications)} + ' application(s) tracked'"></div>
        </div>
        <a class="btn btn-primary" th:href="@{/addApp}">+ Add application</a>
    </div>

    <div class="page-card">
        <div class="alert alert-info mb-0" th:if="${#lists.isEmpty(applications)}">
            No applications yet. <a th:href="@{/addApp}">Add your first one</a>.
        </div>

        <div class="table-responsive" th:unless="${#lists.isEmpty(applications)}">
            <table class="table table-app align-middle mb-0">
                <thead>
                <tr>
                    <th>Company</th>
                    <th>Job title</th>
                    <th>Status</th>
                    <th class="text-end">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="a : ${applications}">
                    <td th:text="${a.company.companyName}">company</td>
                    <td th:text="${a.jobTitle}">jobTitle</td>
                    <td>
                        <span th:switch="${a.status.name()}">
                            <span th:case="'APPLIED'" class="status-badge status-applied">Applied</span>
                            <span th:case="'INTERVIEW'" class="status-badge status-interview">Interview</span>
                            <span th:case="'OFFER'" class="status-badge status-offer">Offer</span>
                            <span th:case="'REJECTED'" class="status-badge status-rejected">Rejected</span>
                            <span th:case="*" class="status-badge" th:text="${a.status}">status</span>
                        </span>
                    </td>
                    <td class="text-end">
                        <a class="btn btn-sm btn-outline-primary"
                           th:href="@{/applications/{id}/edit(id=${a.id})}">Edit</a>
                        <form th:action="@{/applications/{id}/delete(id=${a.id})}" method="post" class="d-inline mb-0 ms-1">
                            <button type="submit" class="btn btn-sm btn-outline-danger"
                                    onclick="return confirm('Delete this application?');">
                                Delete
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

</body>
</html>
