<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Applications</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body class="p-4">

<div class="container" style="max-width: 720px;">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0">Applications</h1>
        <div>
            <a class="btn btn-sm btn-primary" th:href="@{/addApp}">Add application</a>
            <form th:action="@{/logout}" method="post" class="d-inline ml-2">
                <button type="submit" class="btn btn-sm btn-outline-secondary">Sign out</button>
            </form>
        </div>
    </div>

    <div class="alert alert-info" th:if="${#lists.isEmpty(applications)}">
        No applications yet. <a th:href="@{/addApp}">Add your first one</a>.
    </div>

    <table class="table table-striped table-bordered mb-0" th:unless="${#lists.isEmpty(applications)}">
        <thead class="thead-light">
        <tr>
            <th>Company</th>
            <th>Job title</th>
            <th>Status</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="a : ${applications}">
            <td th:text="${a.company.companyName}">company</td>
            <td th:text="${a.jobTitle}">jobTitle</td>
            <td th:text="${a.status}">status</td>
            <td>
                <a class="btn btn-sm btn-outline-primary"
                   th:href="@{/applications/{id}/edit(id=${a.id})}">Edit</a>
                <form th:action="@{/applications/{id}/delete(id=${a.id})}" method="post" class="d-inline mb-0 ml-1">
                    <button type="submit" class="btn btn-sm btn-danger"
                            onclick="return confirm('Delete this application?');">
                        Delete
                    </button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
