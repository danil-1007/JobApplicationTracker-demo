<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Users</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body class="p-4">

<div class="container" style="max-width: 720px;">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0">Users</h1>
        <div>
            <a class="btn btn-sm btn-primary" th:href="@{/add}">Add user</a>
            <form th:action="@{/logout}" method="post" class="d-inline ml-2">
                <button type="submit" class="btn btn-sm btn-outline-secondary">Sign out</button>
            </form>
        </div>
    </div>

    <div class="alert alert-info" th:if="${#lists.isEmpty(users)}">
        No users yet. <a th:href="@{/add}">Add your first one</a>.
    </div>

    <table class="table table-striped table-bordered mb-0" th:unless="${#lists.isEmpty(users)}">
        <thead class="thead-light">
        <tr>
            <th>Email</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="u : ${users}">
            <td th:text="${u.email}">email</td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
