<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title='Users')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar(active='users')}"></nav>

<main class="container py-4" style="max-width: 720px;">
    <div class="page-header">
        <h1>Users</h1>
        <a class="btn btn-primary" th:href="@{/add}">+ Add user</a>
    </div>

    <div class="page-card">
        <div class="alert alert-info mb-0" th:if="${#lists.isEmpty(users)}">
            No users yet. <a th:href="@{/add}">Add your first one</a>.
        </div>

        <div class="table-responsive" th:unless="${#lists.isEmpty(users)}">
            <table class="table table-app align-middle mb-0">
                <thead>
                <tr>
                    <th>Email</th>
                    <th>Role</th>
                    <th class="text-end">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u : ${users}">
                    <td th:text="${u.email}">email</td>
                    <td>
                        <span th:if="${u.role?.name() == 'ADMIN'}" class="status-badge status-offer">Admin</span>
                        <span th:unless="${u.role?.name() == 'ADMIN'}" class="status-badge status-applied">User</span>
                    </td>
                    <td class="text-end">
                        <form th:if="${u.role?.name() != 'ADMIN'}"
                              th:action="@{/users/{id}/promote(id=${u.id})}" method="post" class="d-inline mb-0">
                            <button type="submit" class="btn btn-sm btn-outline-primary"
                                    onclick="return confirm('Make this user an admin?');">
                                Make admin
                            </button>
                        </form>
                        <span th:unless="${u.role?.name() != 'ADMIN'}" class="text-muted-sm">—</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

</body>
</html>
