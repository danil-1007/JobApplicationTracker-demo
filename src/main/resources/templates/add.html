<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title='Sign up')}"></head>
<body>

<div class="auth-shell">
    <div class="auth-card">
        <div class="auth-brand">
            <span class="brand-mark">JT</span> JobTracker
        </div>
        <h1 class="h5 mb-3">Sign up</h1>

        <form th:action="@{/add}" th:object="${signup}" method="post">
            <div class="mb-3">
                <label class="form-label">E-mail</label>
                <input type="email" class="form-control" th:field="*{email}">
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" th:field="*{password}">
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>
            <button type="submit" class="btn btn-primary w-100">Sign up</button>
        </form>

        <div class="alert alert-success mt-3 mb-0" th:if="${user != null}">
            Saved user: <span th:text="${user.email}"></span>
        </div>

        <p class="text-center text-muted-sm mt-3 mb-0">
            Already have an account? <a th:href="@{/login}">Sign in</a>
        </p>
    </div>
</div>

</body>
</html>
