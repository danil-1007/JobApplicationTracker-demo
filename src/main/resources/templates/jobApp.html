<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title='New application')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar(active='new')}"></nav>

<main class="container py-4" style="max-width: 560px;">
    <div class="page-header">
        <h1>Add job application</h1>
    </div>

    <div class="page-card">
        <form th:action="@{/addApp}" th:object="${jobApp}" method="post">
            <div class="mb-3">
                <label class="form-label">Company</label>
                <input type="text" class="form-control" th:field="*{company}">
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('company')}" th:errors="*{company}"></div>
            </div>
            <div class="mb-3">
                <label class="form-label">Job title</label>
                <input type="text" class="form-control" th:field="*{jobTitle}">
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('jobTitle')}" th:errors="*{jobTitle}"></div>
            </div>
            <div class="mb-3">
                <label class="form-label">Status</label>
                <select class="form-select" th:field="*{status}">
                    <option value="" disabled>Select status</option>
                    <option th:each="s : ${statuses}" th:value="${s.name()}" th:text="${s}"></option>
                </select>
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></div>
            </div>
            <button type="submit" class="btn btn-primary">Submit</button>
            <a class="btn btn-outline-secondary ms-2" th:href="@{/showApps}">Cancel</a>
        </form>

        <div class="alert alert-success mt-3 mb-0" th:if="${app != null}">
            Saved application:
            <strong th:text="${app.company.companyName}"></strong> —
            <span th:text="${app.jobTitle}"></span>
            (<span class="fw-semibold" th:text="${app.status}"></span>)
        </div>
    </div>
</main>

</body>
</html>
