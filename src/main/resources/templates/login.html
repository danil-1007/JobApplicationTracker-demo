<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title='Sign in')}"></head>
<body>

<div class="auth-shell">
    <div class="auth-card">
        <div class="auth-brand">
            <span class="brand-mark">JT</span> JobTracker
        </div>
        <h1 class="h5 mb-3">Sign in</h1>

        <div class="alert alert-danger" th:if="${param.error}">Invalid email or password.</div>
        <div class="alert alert-success" th:if="${param.logout}">You have been signed out.</div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label">E-mail</label>
                <input type="email" class="form-control" name="username" autocomplete="username" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" name="password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Sign in</button>
        </form>

        <p class="text-center text-muted-sm mt-3 mb-0">
            No account yet? <a th:href="@{/add}">Sign up</a>
        </p>
    </div>
</div>

</body>
</html>
