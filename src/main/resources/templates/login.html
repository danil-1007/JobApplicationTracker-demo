<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sign in</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body class="p-4">

<div class="container" style="max-width: 520px;">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0">Sign in</h1>
        <a class="btn btn-sm btn-outline-secondary" th:href="@{/add}">Sign up</a>
    </div>

    <div class="alert alert-danger" th:if="${param.error}">
        Invalid email or password.
    </div>
    <div class="alert alert-success" th:if="${param.logout}">
        You have been signed out.
    </div>

    <form th:action="@{/login}" method="post">
        <table>
            <tr>
                <td>E-mail</td>
                <td><input type="email" name="username" autocomplete="username" required></td>
            </tr>
            <tr>
                <td>Password</td>
                <td><input type="password" name="password" autocomplete="current-password" required></td>
            </tr>
            <tr>
                <td colspan="2"><input type="submit" class="btn btn-primary" value="Sign in"></td>
            </tr>
        </table>
    </form>
</div>

</body>
</html>
