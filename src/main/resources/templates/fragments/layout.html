<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title} + ' · JobTracker'">JobTracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        :root {
            --bg: #f4f6fb;
            --surface: #ffffff;
            --primary: #4f46e5;
            --primary-dark: #4338ca;
            --primary-light: #eef2ff;
            --text: #1f2330;
            --muted: #6b7280;
            --border: #e5e7eb;

            --success: #16a34a;
            --success-bg: #dcfce7;
            --warning: #b45309;
            --warning-bg: #fef3c7;
            --danger: #dc2626;
            --danger-bg: #fee2e2;
            --info: #1d4ed8;
            --info-bg: #dbeafe;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            min-height: 100vh;
        }

        /* Navbar */
        .navbar-app {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            box-shadow: 0 1px 2px rgba(16, 24, 40, 0.04);
            padding: 0.75rem 0;
        }
        .navbar-app .navbar-brand {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 700;
            color: var(--text);
        }
        .navbar-app .brand-mark {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--primary);
            color: #fff;
            font-size: 0.8rem;
            font-weight: 700;
        }
        .navbar-app .nav-link {
            color: var(--muted);
            font-weight: 500;
            border-radius: 6px;
            padding: 0.4rem 0.75rem;
        }
        .navbar-app .nav-link:hover { color: var(--text); background: var(--bg); }
        .navbar-app .nav-link.active { color: var(--primary); background: var(--primary-light); }

        /* Cards */
        .page-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 1px 3px rgba(16, 24, 40, 0.06);
            padding: 1.75rem;
        }

        .auth-shell {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .auth-card {
            width: 100%;
            max-width: 420px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(16, 24, 40, 0.08);
            padding: 2rem;
        }
        .auth-brand {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
        }

        /* Buttons */
        .btn {
            border-radius: 8px;
            font-weight: 500;
        }
        .btn-primary {
            background: var(--primary);
            border-color: var(--primary);
        }
        .btn-primary:hover, .btn-primary:focus {
            background: var(--primary-dark);
            border-color: var(--primary-dark);
        }

        /* Forms */
        .form-label {
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text);
        }
        .form-control, .form-select {
            border-radius: 8px;
            border-color: var(--border);
            padding: 0.55rem 0.8rem;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 0.2rem var(--primary-light);
        }

        /* Table */
        .table-app thead th {
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
            font-weight: 600;
        }
        .table-app tbody td {
            vertical-align: middle;
            border-color: var(--border);
        }
        .table-app tbody tr:hover { background: var(--bg); }

        /* Status badges */
        .status-badge {
            display: inline-block;
            padding: 0.35em 0.7em;
            border-radius: 999px;
            font-size: 0.78rem;
            font-weight: 600;
        }
        .status-applied { background: var(--info-bg); color: var(--info); }
        .status-interview { background: var(--warning-bg); color: var(--warning); }
        .status-offer { background: var(--success-bg); color: var(--success); }
        .status-rejected { background: var(--danger-bg); color: var(--danger); }

        /* Alerts */
        .alert { border-radius: 10px; border: none; }
        .alert-info { background: var(--info-bg); color: var(--info); }
        .alert-success { background: var(--success-bg); color: var(--success); }
        .alert-danger { background: var(--danger-bg); color: var(--danger); }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .page-header h1 {
            font-size: 1.35rem;
            font-weight: 700;
            margin: 0;
        }
        .text-muted-sm { color: var(--muted); font-size: 0.9rem; }
    </style>
</head>
<body>

<nav th:fragment="navbar(active)" class="navbar navbar-expand-md navbar-app">
    <div class="container">
        <a class="navbar-brand" th:href="@{/showApps}">
            <span class="brand-mark">JT</span> JobTracker
        </a>
        <ul class="navbar-nav me-auto flex-row flex-wrap gap-1">
            <li class="nav-item">
                <a class="nav-link" th:classappend="${active == 'apps'} ? 'active' : ''" th:href="@{/showApps}">Applications</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:classappend="${active == 'new'} ? 'active' : ''" th:href="@{/addApp}">New application</a>
            </li>
            <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                <a class="nav-link" th:classappend="${active == 'users'} ? 'active' : ''" th:href="@{/show}">Users</a>
            </li>
        </ul>
        <form th:action="@{/logout}" method="post" class="mb-0">
            <button type="submit" class="btn btn-sm btn-outline-secondary">Sign out</button>
        </form>
    </div>
</nav>

</body>
</html>
